name: Release Binaries

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: hdhomerun_proxy-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: hdhomerun_proxy-linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            asset_name: hdhomerun_proxy-linux-arm-v7
          - goos: windows
            goarch: amd64
            asset_name: hdhomerun_proxy-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${RELEASE_TAG}" \
            -o ${{ matrix.asset_name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  package:
    name: Build ${{ matrix.nfpm_arch }} deb/rpm
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goarch: amd64
            nfpm_arch: amd64
          - goarch: arm64
            nfpm_arch: arm64
          - goarch: arm-v7
            nfpm_arch: arm7

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download binary
        uses: actions/download-artifact@v8
        with:
          name: hdhomerun_proxy-linux-${{ matrix.goarch }}
          path: .

      - name: Prepare binary
        run: |
          mv hdhomerun_proxy-linux-${{ matrix.goarch }} hdhomerun_proxy
          chmod +x hdhomerun_proxy

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: go.mod

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.46.3

      - name: Build packages
        env:
          ARCH: ${{ matrix.nfpm_arch }}
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          nfpm package --config nfpm.yaml --packager deb --target "hdhomerun-proxy_${VERSION}_${ARCH}.deb"
          nfpm package --config nfpm.yaml --packager rpm --target "hdhomerun-proxy_${VERSION}_${ARCH}.rpm"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: hdhomerun-proxy-${{ matrix.nfpm_arch }}-packages
          path: |
            hdhomerun-proxy_${{ env.VERSION }}_${{ matrix.nfpm_arch }}.deb
            hdhomerun-proxy_${{ env.VERSION }}_${{ matrix.nfpm_arch }}.rpm

  release:
    name: Create release
    needs: [build, package]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
